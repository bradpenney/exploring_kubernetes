site_name: "Exploring Kubernetes"
site_url: https://k8s.bradpenney.io
site_description: A progressive journey through Kubernetes, from your first deployment to production operations.
site_author: Brad Penney
copyright: >-
  Copyright &copy; Brad Penney —
  <a href="#__consent">Change cookie settings</a>

extra:
  analytics:
    provider: google
    property: G-V01MJ4R3SQ
  consent:
    title: Cookie consent
    description: >-
      We use cookies to measure how effective our content is and whether you
      find what you're looking for. With your consent, you help make these
      learning sites better. You can change your choice at any time.
    cookies:
      analytics:
        name: Google Analytics
        checked: false
    actions:
      - accept
      - reject
      - manage
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bradpenney
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/bradpenney
    - icon: fontawesome/solid/globe
      link: https://bradpenney.io
    - icon: fontawesome/solid/rss
      link: https://k8s.bradpenney.io/feed_rss_created.xml

extra_css:
  - stylesheets/extra.css
theme:
  name: material
  custom_dir: overrides
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    scheme: slate
    primary: black
    accent: amber
  logo: images/exploring_kubernetes.png
  favicon: images/exploring_kubernetes.png
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.code.highlight
    - content.tooltips
    - content.code.mermaid

plugins:
  - search
  - meta
  - exclude:
      glob:
        # Essentials Core Primitives — ALL PUBLISHED (overview, pods, services,
        # config_and_secrets, namespaces, labels_selectors) as of 2026-06-18.
        # Security — rewritten to dual persona; UNPUBLISHED until Core Primitives ships (2026-06-18)
        - "essentials/security_overview.md"
        - "essentials/security_context.md"
        - "essentials/handling_secrets.md"
        - "essentials/understanding_access.md"
        - "essentials/pod_security_standards.md"
        # Architecture — PUBLISHED 2026-07-14 (finished stub, light control-plane/nodes intro).
        # Troubleshooting — surgical move of Pod failure-state content out of
        # pods.md (2026-06-19). DRAFT until the fuller diagnostic articles exist.
        - "essentials/troubleshooting_overview.md"
        - "essentials/pod_failure_states.md"
        - "essentials/stuck_terminating.md"
        - "essentials/service_connectivity.md"
        # Efficiency — drafts listed individually since networking/gateway_api.md
        # published (2026-07-02). New efficiency drafts must be ADDED here.
        - "efficiency/overview.md"
        - "efficiency/workloads_overview.md"
        - "efficiency/deployments.md"
        - "efficiency/replicasets.md"
        - "efficiency/statefulsets.md"
        - "efficiency/daemonsets.md"
        - "efficiency/jobs_cronjobs.md"
        - "efficiency/deployment_strategies.md"
        - "efficiency/networking_overview.md"
        - "efficiency/services_deep_dive.md"
        - "efficiency/network_policies.md"
        - "efficiency/dns_service_discovery.md"
        - "efficiency/troubleshooting_networking.md"
        # Mastery (Storage + Scheduling/Security + Production Ops) — all draft
        - "mastery/*"
  - rss:
      match_path: ".*"
      image: https://k8s.bradpenney.io/images/exploring_kubernetes.png
      abstract_chars_count: 160
      length: 20
      date_from_meta:
        as_creation: "date"
        as_update: "git"
        default_timezone: "America/Halifax"
      categories:
        - tags
      use_material_social_cards: false
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1a202c"
        color: "#cbd5e0"
  - htmlproofer:
      enabled: true
      validate_rendered_template: true
      validate_external_urls: false
      raise_error: true
      raise_error_after_finish: true
      raise_error_excludes:
        404:
          - "#__consent"

markdown_extensions:
  - toc:
      permalink: "🔗"
      permalink_title: "Link to this section"
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

nav:
